<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manage Stock — Tunify Control Panel</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/pages.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.16.1/sweetalert2.css"
    integrity="sha512-fjO3Vy3QodX9c6G9AUmr6WuIaEPdGRxBjD7gjatG5gGylzYyrEq3U0q+smkG6CwIY0L8XALRFHh4KPHig0Q1ug=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
  <div id="tunifyNav"></div>

  <div class="page-wrap">
    <div class="container">
      <div class="page-header fade-in-up">
        <div class="d-flex align-items-center justify-content-between" style="gap:1rem">
          <div>
            <p class="section-eyebrow">Inventory</p>
            <h1 class="section-title">Manage Stock</h1>
            <p class="section-sub">View and update stock quantities for all items.</p>
          </div>
          <button class="btn-gold" id="btnBulkRestock"><i class="fas fa-cubes mr-1"></i> Restock</button>
        </div>
      </div>

      <!-- Stock Status Filter Bar -->
      <div class="d-flex align-items-center flex-wrap mb-3 fade-in-up" id="stockFilterBar" style="gap:0.5rem;">
        <span style="font-size:0.8rem; color:var(--text-dim); margin-right:0.25rem;"><i class="fas fa-filter mr-1"></i>Filter:</span>
        <button class="btn btn-sm stock-filter-btn active" data-filter="all"
          style="border-radius:20px; font-size:0.78rem; padding:0.3rem 1rem; border:1px solid rgba(255,255,255,0.15); background:rgba(255,255,255,0.08); color:var(--text);">
          All
        </button>
        <button class="btn btn-sm stock-filter-btn" data-filter="outofstock"
          style="border-radius:20px; font-size:0.78rem; padding:0.3rem 1rem; border:1px solid rgba(239,68,68,0.35); background:rgba(239,68,68,0.08); color:#f87171;">
          <i class="fas fa-times-circle mr-1"></i>Out of Stock
        </button>
        <button class="btn btn-sm stock-filter-btn" data-filter="lowstock"
          style="border-radius:20px; font-size:0.78rem; padding:0.3rem 1rem; border:1px solid rgba(251,191,36,0.35); background:rgba(251,191,36,0.06); color:#FBBF24;">
          <i class="fas fa-exclamation-triangle mr-1"></i>Low Stock
        </button>
        <button class="btn btn-sm stock-filter-btn" data-filter="instock"
          style="border-radius:20px; font-size:0.78rem; padding:0.3rem 1rem; border:1px solid rgba(16,185,129,0.35); background:rgba(16,185,129,0.08); color:#34d399;">
          <i class="fas fa-check-circle mr-1"></i>In Stock
        </button>
      </div>

      <!-- Data Table Card -->
      <div class="panel-card fade-in-up mt-2">
        <div class="table-responsive">
          <table id="stockTable" class="display nowrap" style="width:100%">
            <thead>
              <tr>
                <th>Item ID</th>
                <th>Item Name</th>
                <th>Category</th>
                <th>Current Stock</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              <!-- Populated dynamically -->
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal: Restock Single Instrument -->
  <div class="modal fade" id="stockModal" tabindex="-1" role="dialog" aria-hidden="true">
    <div class="modal-dialog" role="document">
      <div class="modal-content">
        <form id="stockForm" class="form-tunify" novalidate>
          <div class="modal-header">
            <h5 class="modal-title" id="modalTitle">Restock Instrument</h5>
            <button type="button" class="close" data-dismiss="modal" aria-label="Close">
              <span aria-hidden="true">&times;</span>
            </button>
          </div>
          <div class="modal-body">
            <input type="hidden" id="stockItemId" />
            <div class="form-group">
              <label id="stockItemName" style="font-weight:600; color:var(--gold)"></label>
            </div>

            <div class="form-row">
              <div class="form-group col-md-6">
                <label for="stockQty">Quantity to Add</label>
                <input type="number" class="form-control" id="stockQty" min="1" placeholder="e.g. 5" required />
                <div class="invalid-feedback">Enter a valid quantity (1 or more).</div>
              </div>
              <div class="form-group col-md-6">
                <label for="restockCost">Unit Cost Price (₱)</label>
                <input type="number" class="form-control" id="restockCost" min="1" placeholder="e.g. 15000" required />
                <div class="invalid-feedback">Enter a valid cost price (1 or more).</div>
              </div>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-outline-secondary" data-dismiss="modal">Cancel</button>
            <button type="submit" class="btn-gold"><i class="fas fa-save mr-1"></i> Update Stock</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Modal: Restock Instruments -->
  <div class="modal fade" id="bulkRestockModal" tabindex="-1" role="dialog" aria-hidden="true">
    <div class="modal-dialog modal-lg" role="document">
      <div class="modal-content">
        <form id="bulkRestockForm" class="form-tunify" novalidate>
          <div class="modal-header">
            <h5 class="modal-title">Restock Instruments</h5>
            <button type="button" class="close" data-dismiss="modal" aria-label="Close">
              <span aria-hidden="true">&times;</span>
            </button>
          </div>
          <div class="modal-body" style="max-height: 60vh; overflow-y: auto;">
            <div class="table-responsive">
              <table class="table table-dark table-striped" id="bulkRestockTable" style="background: transparent;">
                <thead>
                  <tr>
                    <th style="width: 45%; border: none;">Instrument</th>
                    <th style="width: 20%; border: none;">Qty to Add</th>
                    <th style="width: 25%; border: none;">Unit Cost (₱)</th>
                    <th style="width: 10%; border: none; text-align: center;">Actions</th>
                  </tr>
                </thead>
                <tbody id="bulkRestockBody">
                  <!-- Rows appended dynamically by admin-stock.js -->
                </tbody>
              </table>
            </div>
            <button type="button" class="btn btn-outline-info btn-sm mt-2" id="btnAddRestockRow">
              <i class="fas fa-plus mr-1"></i> Add Row
            </button>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-outline-secondary" data-dismiss="modal">Cancel</button>
            <button type="submit" class="btn-gold"><i class="fas fa-save mr-1"></i> Save Restocks</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <div id="tunifyFooter"></div>
  <div class="toast-container" id="toastContainer"></div>

  <!-- JS Dependencies -->
  <script src="https://code.jquery.com/jquery-3.6.4.min.js"
    integrity="sha256-oP6HI9z1XaZNBrJURtCoUT5SUnxFr8s3BzRl+cbzUq8=" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.min.js"></script>
  <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>

  <!-- DataTables -->
  <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
  <!-- SweetAlert2 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.16.1/sweetalert2.min.js"
    integrity="sha512-LGHBR+kJ5jZSIzhhdfytPoEHzgaYuTRifq9g5l6ja6/k9NAOsAi5dQh4zQF6JIRB8cAYxTRedERUF+97/KuivQ=="
    crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <!-- Bootbox -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/bootbox.js/5.5.2/bootbox.min.js"></script>

  <script src="../js/data.js"></script>
  <script src="../js/app.js"></script>
  <script src="js/admin-stock.js?v=2026"></script>
</body>

</html>
