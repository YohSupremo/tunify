<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manage Categories — Tunify Control Panel</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/pages.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.16.1/sweetalert2.css"
    integrity="sha512-fjO3Vy3QodX9c6G9AUmr6WuIaEPdGRxBjD7gjatG5gGylzYyrEq3U0q+smkG6CwIY0L8XALRFHh4KPHig0Q1ug=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
  <div id="tunifyNav"></div>

  <div class="page-wrap">
    <div class="container">
      <div class="page-header fade-in-up">
        <div class="d-flex flex-wrap align-items-center justify-content-between" style="gap:1rem">
          <div>
            <p class="section-eyebrow">Inventory classification</p>
            <h1 class="section-title">Manage Categories</h1>
            <p class="section-sub">Add, modify, and delete product categories for inventory sorting.</p>
          </div>
          <button class="btn-gold" id="btnAddNewCat"><i class="fas fa-plus mr-1"></i> Add Category</button>
        </div>
      </div>

      <!-- Data Table Card -->
      <div class="panel-card fade-in-up mt-4" style="max-width: 900px; margin: 0 auto;">
        <div class="table-responsive">
          <table id="catsTable" class="display nowrap" style="width:100%">
            <thead>
              <tr>
                <th>ID</th>
                <th>Category Name</th>
                <th>Associated Products</th>
                <th>Description</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </div>

  <!-- Modal Form: Add / Edit Category -->
  <div class="modal fade" id="catModal" tabindex="-1" role="dialog" aria-hidden="true">
    <div class="modal-dialog" role="document">
      <div class="modal-content">
        <form id="catForm" class="form-tunify" novalidate>
          <div class="modal-header">
            <h5 class="modal-title" id="modalTitle">Add Category</h5>
            <button type="button" class="close" data-dismiss="modal" aria-label="Close">
              <span aria-hidden="true">&times;</span>
            </button>
          </div>
          <div class="modal-body">
              <input type="hidden" id="catOldName" value="" />
              <input type="hidden" id="catId" value="" />
              
              <div class="form-group">
                <label for="catName">Category Name</label>
                <input type="text" class="form-control" id="catName" placeholder="e.g. Percussion" required />
                <div class="invalid-feedback">Please enter category name.</div>
              </div>

              <div class="form-group">
                <label for="catDesc">Description</label>
                <textarea class="form-control" id="catDesc" placeholder="Describe this category..." rows="3"></textarea>
              </div>

              <div class="form-group" id="prodChecklistGroup">
                <label>Associate Products</label>
                <div id="productChecklist" style="max-height: 180px; overflow-y: auto; border: 1px solid rgba(255,255,255,0.08); padding: 0.75rem; border-radius: 8px; background: rgba(0,0,0,0.25);">
                </div>
                <small class="form-text text-muted" style="font-size:0.7rem;">Check the products that belong to this category.</small>
              </div>
            </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-outline-secondary" data-dismiss="modal">Cancel</button>
            <button type="submit" class="btn-gold" id="btnSaveCat"><i class="fas fa-save mr-1"></i> Save
              Category</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <div id="tunifyFooter"></div>
  <div class="toast-container" id="toastContainer"></div>

  <!-- JS Dependencies -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.min.js"></script>
  <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>

  <!-- DataTables -->
  <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
  <!-- SweetAlert2 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.16.1/sweetalert2.min.js"
    integrity="sha512-LGHBR+kJ5jZSIzhhdfytPoEHzgaYuTRifq9g5l6ja6/k9NAOsAi5dQh4zQF6JIRB8cAYxTRedERUF+97/KuivQ=="
    crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <!-- Bootbox -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/bootbox.js/5.5.2/bootbox.min.js"></script>

  <script src="../js/data.js"></script>
  <script src="../js/app.js"></script>
  <script src="js/admin-categories.js?v=2026"></script>
</body>

</html>
