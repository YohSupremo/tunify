<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manage Reviews — Tunify Control Panel</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/pages.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.16.1/sweetalert2.css"
    integrity="sha512-fjO3Vy3QodX9c6G9AUmr6WuIaEPdGRxBjD7gjatG5gGylzYyrEq3U0q+smkG6CwIY0L8XALRFHh4KPHig0Q1ug=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <style>
    /* ── Filter Bar ────────────────────────────────────────────── */
    .status-filters-wrapper {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(255, 255, 255, 0.02);
      padding: 4px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    .filter-label {
      font-family: var(--font-body);
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-dim);
      padding-left: 0.75rem;
      padding-right: 0.25rem;
      white-space: nowrap;
    }
    .filter-label.separator {
      border-left: 1px solid rgba(255,255,255,0.08);
      padding-left: 0.75rem;
    }
    #filterStatusSelect,
    #filterProductSelect {
      width: auto !important;
      background-color: rgba(255, 255, 255, 0.03) !important;
      border: 1px solid rgba(255, 255, 255, 0.08) !important;
      color: var(--text-dim) !important;
      border-radius: 8px !important;
      font-size: 0.72rem !important;
      font-weight: 600 !important;
      text-transform: uppercase !important;
      letter-spacing: 0.5px !important;
      height: 32px !important;
      padding: 0 2.2rem 0 0.75rem !important;
      cursor: pointer;
      transition: all 0.25s ease;
      margin-left: 0.25rem;
      margin-right: 0.5rem;
    }
    #filterStatusSelect:focus,
    #filterProductSelect:focus {
      border-color: var(--gold) !important;
      color: var(--text) !important;
      box-shadow: 0 0 0 3px rgba(251,191,36,0.12) !important;
      outline: none !important;
    }
    #filterStatusSelect option,
    #filterProductSelect option {
      background-color: #111827 !important;
      color: #ffffff !important;
    }
    #btnClearFilters {
      height: 32px !important;
      background-color: rgba(239, 68, 68, 0.08) !important;
      border: 1px solid rgba(239, 68, 68, 0.2) !important;
      color: rgba(239, 68, 68, 0.8) !important;
      border-radius: 8px !important;
      font-size: 0.72rem !important;
      font-weight: 600 !important;
      text-transform: uppercase !important;
      letter-spacing: 0.5px !important;
      padding: 0 1rem !important;
      cursor: pointer;
      transition: all 0.25s ease !important;
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      margin-left: 0.25rem;
    }
    #btnClearFilters:hover {
      background-color: rgba(239, 68, 68, 0.2) !important;
      border-color: rgba(239, 68, 68, 0.4) !important;
      color: #ffffff !important;
      box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.15) !important;
    }
  </style>
</head>

<body>
  <div id="tunifyNav"></div>

  <div class="page-wrap">
    <div class="container">
      <div class="page-header fade-in-up">
        <div>
          <p class="section-eyebrow">Moderation</p>
          <h1 class="section-title">Manage Product Reviews</h1>
          <p class="section-sub">Moderation queue for product reviews. Inspect feedback ratings, read comments, and hide toxic reviews from public view.</p>
        </div>
      </div>

      <!-- Filter Bar -->
      <div class="status-filters-wrapper mt-3">
        <span class="filter-label">Status</span>
        <select class="custom-select custom-select-sm" id="filterStatusSelect">
          <option value="">All Statuses</option>
          <option value="active">Active Only</option>
          <option value="hidden">Hidden Only</option>
        </select>
        
        <span class="filter-label separator">Product</span>
        <select class="custom-select custom-select-sm" id="filterProductSelect" style="max-width: 250px;">
          <option value="">All Products</option>
        </select>

        <span class="filter-label separator" style="display: inline-block; height: 16px; padding: 0; margin-left: 0.5rem; margin-right: 0.25rem;"></span>
        <button id="btnClearFilters"><i class="fas fa-times-circle"></i> Clear</button>
      </div>

      <!-- Data Table Card -->
      <div class="panel-card fade-in-up mt-4">
        <div class="table-responsive">
          <table id="reviewsTable" class="display nowrap" style="width:100%">
            <thead>
              <tr>
                <th>ID</th>
                <th>Product</th>
                <th>Customer</th>
                <th>Rating</th>
                <th>Comment</th>
                <th>Date Submitted</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              <!-- Populated dynamically -->
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <div id="tunifyFooter"></div>
  <div class="toast-container" id="toastContainer"></div>

  <!-- JS Dependencies -->
  <script src="https://code.jquery.com/jquery-3.6.4.min.js"
    integrity="sha256-oP6HI9z1XaZNBrJURtCoUT5SUnxFr8s3BzRl+cbzUq8=" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.min.js"></script>
  <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>

  <!-- DataTables -->
  <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
  <!-- SweetAlert2 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.16.1/sweetalert2.min.js"
    integrity="sha512-LGHBR+kJ5jZSIzhhdfytPoEHzgaYuTRifq9g5l6ja6/k9NAOsAi5dQh4zQF6JIRB8cAYxTRedERUF+97/KuivQ=="
    crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <!-- Bootbox -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/bootbox.js/5.5.2/bootbox.min.js"></script>

  <script src="../js/data.js"></script>
  <script src="../js/app.js"></script>
  <script src="js/admin-reviews.js?v=2026"></script>
</body>

</html>
