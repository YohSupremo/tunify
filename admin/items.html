<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manage Items — Tunify Control Panel</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css" />
  <link rel="stylesheet" href="https://cdn.datatables.net/buttons/2.4.1/css/buttons.dataTables.min.css" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/pages.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.16.1/sweetalert2.css"
    integrity="sha512-fjO3Vy3QodX9c6G9AUmr6WuIaEPdGRxBjD7gjatG5gGylzYyrEq3U0q+smkG6CwIY0L8XALRFHh4KPHig0Q1ug=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <style>
    /* ── Filter Bar — exact match to customers page ─────────────── */
    .status-filters-wrapper {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(255, 255, 255, 0.02);
      padding: 4px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    .filter-label {
      font-family: var(--font-body);
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-dim);
      padding-left: 0.75rem;
      padding-right: 0.25rem;
      white-space: nowrap;
    }
    .filter-label.separator {
      border-left: 1px solid rgba(255,255,255,0.08);
      padding-left: 0.75rem;
    }
    #filterStatus,
    #filterCategory,
    #filterBrand,
    #filterStock {
      width: auto !important;
      background-color: rgba(255, 255, 255, 0.03) !important;
      border: 1px solid rgba(255, 255, 255, 0.08) !important;
      color: var(--text-dim) !important;
      border-radius: 8px !important;
      font-size: 0.72rem !important;
      font-weight: 600 !important;
      text-transform: uppercase !important;
      letter-spacing: 0.5px !important;
      height: 32px !important;
      padding: 0 2.2rem 0 0.75rem !important;
      cursor: pointer;
      transition: all 0.25s ease;
      margin-left: 0.25rem;
      margin-right: 0.5rem;
    }
    #filterStatus:focus,
    #filterCategory:focus,
    #filterBrand:focus,
    #filterStock:focus {
      border-color: var(--gold) !important;
      color: var(--text) !important;
      box-shadow: 0 0 0 3px rgba(251,191,36,0.12) !important;
      outline: none !important;
    }
    #filterStatus:hover,
    #filterCategory:hover,
    #filterBrand:hover,
    #filterStock:hover {
      border-color: rgba(255, 255, 255, 0.15) !important;
      color: var(--text) !important;
    }
    #filterStatus option,
    #filterCategory option,
    #filterBrand option,
    #filterStock option {
      background-color: #100C16 !important;
      color: var(--text) !important;
      text-transform: none;
    }
    /* Modal overrides */
    .modal .form-control,
    .modal select.form-control {
      background: rgba(13, 23, 42, 0.7) !important;
      border: 1.5px solid rgba(255, 255, 255, 0.08) !important;
      color: #FFF5F5 !important;
      border-radius: 8px !important;
      transition: border-color 0.25s, box-shadow 0.25s;
    }
    .modal .form-control:focus,
    .modal select.form-control:focus {
      border-color: #FBBF24 !important;
      box-shadow: 0 0 0 3px rgba(251,191,36,0.12) !important;
      outline: none;
    }
    .modal select.form-control option { background: #100C16; color: #FFF5F5; }
    .modal-content {
      background: rgba(10, 7, 16, 0.97) !important;
      border: 1px solid rgba(255,255,255,0.07) !important;
      border-radius: 16px !important;
      backdrop-filter: blur(24px);
    }
    .modal-header { border-bottom: 1px solid rgba(255,255,255,0.06) !important; }
    .modal-footer { border-top:    1px solid rgba(255,255,255,0.06) !important; }
    .modal-title  { color: #FFF5F5; font-family: 'Playfair Display', serif; font-size: 1.1rem; }
    .modal .form-control::placeholder { color: #94A3B8; font-size: 0.85rem; }
    .modal label  { font-size: 0.68rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: #94A3B8; margin-bottom: 0.35rem; }
    .close { color: #94A3B8 !important; }
    .close:hover { color: #FFF5F5 !important; }
    /* Deactivated row */
    .row-deactivated td { opacity: 0.5; }
    .badge-deactivated {
      background: rgba(239,68,68,0.15);
      color: #F87171;
      font-size: 0.65rem;
      padding: 2px 7px;
      border-radius: 20px;
      border: 1px solid rgba(239,68,68,0.3);
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-left: 6px;
    }
  </style>
</head>

<body>
  <div id="tunifyNav"></div>

  <div class="page-wrap">
    <div class="container">
      <div class="page-header fade-in-up">
        <div class="d-flex align-items-center justify-content-between" style="gap:1rem">
          <div>
            <p class="section-eyebrow">Catalog</p>
            <h1 class="section-title">Manage Instruments</h1>
            <p class="section-sub">Add, modify, and delete instruments, parts, and accessories.</p>
          </div>
          <button class="btn-gold" id="btnAddNewItem"><i class="fas fa-plus mr-1"></i> Add Instrument</button>
        </div>
        <!-- Filter Bar -->
        <div class="status-filters-wrapper mt-3">
          <span class="filter-label">Status</span>
          <select class="custom-select custom-select-sm" id="filterStatus">
            <option value="active">Active</option>
            <option value="deactivated">Deactivated</option>
            <option value="all">All Statuses</option>
          </select>
          <span class="filter-label separator">Category</span>
          <select class="custom-select custom-select-sm" id="filterCategory">
            <option value="all">All Categories</option>
          </select>
          <span class="filter-label separator">Brand</span>
          <select class="custom-select custom-select-sm" id="filterBrand">
            <option value="all">All Brands</option>
          </select>
          <span class="filter-label separator">Stock</span>
          <select class="custom-select custom-select-sm" id="filterStock">
            <option value="all">All Levels</option>
            <option value="instock">In Stock (&gt;5)</option>
            <option value="low">Low Stock (1–5)</option>
            <option value="out">Out of Stock</option>
          </select>
        </div>
      </div>

      <!-- Data Table Card -->
      <div class="panel-card fade-in-up mt-4">
        <div class="table-responsive">
          <table id="itable" class="display nowrap" style="width:100%">
            <thead>
              <tr>
                <th>ID</th>
                <th>Image</th>
                <th>Name</th>
                <th>Brand</th>
                <th>Category</th>
                <th>Description</th>
                <th>Sell Price</th>
                <th>Stock</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              <!-- Populated dynamically by js/admin-items.js -->
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </div>

  <!-- Modal Form: Add / Edit Item -->
  <div class="modal fade" id="itemModal" tabindex="-1" role="dialog" aria-hidden="true">
    <div class="modal-dialog modal-lg" role="document">
      <div class="modal-content">
        <form id="itemForm" class="form-tunify" novalidate>
          <div class="modal-header">
            <h5 class="modal-title" id="modalTitle">Add Instrument</h5>
            <button type="button" class="close" data-dismiss="modal" aria-label="Close">
              <span aria-hidden="true">&times;</span>
            </button>
          </div>
          <div class="modal-body">
            <input type="hidden" id="itemId" value="" />

            <div class="form-row">
              <div class="form-group col-md-4">
                <label for="itemName">Instrument / Item Name</label>
                <input type="text" class="form-control" id="itemName" name="itemName" placeholder="e.g. Stratocaster Player" required />
              </div>
              <div class="form-group col-md-3">
                <label for="itemBrand">Brand</label>
                <select class="form-control" id="itemBrand" name="itemBrand" required>
                  <!-- Populated dynamically -->
                </select>
              </div>
              <div class="form-group col-md-2">
                <label for="itemCategory">Category</label>
                <select class="form-control" id="itemCategory" name="itemCategory" required>
                  <option value="string">String</option>
                  <option value="percussion">Percussion</option>
                  <option value="keys">Keys</option>
                  <option value="wind">Wind</option>
                  <option value="vocals">Vocals</option>
                  <option value="accessories">Accessories</option>
                </select>
              </div>
              <div class="form-group col-md-3">
                <label for="itemSupplier">Supplier</label>
                <select class="form-control" id="itemSupplier" name="itemSupplier" required>
                  <!-- Populated dynamically -->
                </select>
              </div>
            </div>

            <div class="form-row">
              <div class="form-group col-md-6">
                <label for="itemPrice">Selling Price (₱)</label>
                <input type="number" class="form-control" id="itemPrice" name="itemPrice" placeholder="Retail price" min="1" required />
              </div>
              <div class="form-group col-md-6">
                <label for="itemStock">Stock Level</label>
                <input type="number" class="form-control" id="itemStock" name="itemStock" value="0" readonly required />
              </div>
            </div>

            <div class="form-row">
              <div class="form-group col-md-12">
                <label for="itemImageFile">Instrument Photos (Select one or more)</label>
                <div class="custom-file mb-3">
                  <input type="file" class="custom-file-input" id="itemImageFile"
                    accept="image/png, image/jpeg, image/jpg" multiple />
                  <label class="custom-file-label" for="itemImageFile" id="fileLabel">Choose image files...</label>
                </div>
                <div id="imagePreviewContainer" class="d-flex flex-wrap mt-2" style="gap: 15px; margin-bottom: 15px;"></div>
                <small class="form-text text-muted" style="font-size:0.7rem;">Only .jpg, .jpeg, and .png allowed. Max
                  size 2MB per image.</small>
              </div>
            </div>

            <div class="form-group">
              <label for="itemDesc">Description</label>
              <textarea class="form-control" id="itemDesc" name="itemDesc" rows="3"
                placeholder="Brief marketing description of the instrument..."></textarea>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-outline-secondary" data-dismiss="modal">Cancel</button>
            <button type="button" class="btn-gold" id="itemSubmit"><i class="fas fa-plus mr-1"></i> Add
              Instrument</button>
            <button type="button" class="btn-gold" id="itemUpdate" style="display:none"><i class="fas fa-save mr-1"></i>
              Update Instrument</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <div id="tunifyFooter"></div>
  <div class="toast-container" id="toastContainer"></div>

  <!-- JS Dependencies -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.min.js"></script>
  <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>

  <!-- DataTables + Buttons Export -->
  <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
  <script src="https://cdn.datatables.net/buttons/2.4.1/js/dataTables.buttons.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/pdfmake.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/vfs_fonts.js"></script>
  <script src="https://cdn.datatables.net/buttons/2.4.1/js/buttons.html5.min.js"></script>
  <script src="https://cdn.datatables.net/buttons/2.4.1/js/buttons.print.min.js"></script>

  <!-- SweetAlert2 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.16.1/sweetalert2.min.js"
    integrity="sha512-LGHBR+kJ5jZSIzhhdfytPoEHzgaYuTRifq9g5l6ja6/k9NAOsAi5dQh4zQF6JIRB8cAYxTRedERUF+97/KuivQ=="
    crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <!-- Bootbox -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/bootbox.js/5.5.2/bootbox.min.js"></script>
  <!-- jQuery Validation -->
  <script src="https://cdn.jsdelivr.net/npm/jquery-validation@1.19.5/dist/jquery.validate.min.js"></script>

  <script src="../js/data.js"></script>
  <script src="../js/app.js"></script>
  <script src="js/admin-items.js?v=20260622"></script>
</body>

</html>
