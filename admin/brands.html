<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manage Brands — Tunify Control Panel</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/pages.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.16.1/sweetalert2.css"
    integrity="sha512-fjO3Vy3QodX9c6G9AUmr6WuIaEPdGRxBjD7gjatG5gGylzYyrEq3U0q+smkG6CwIY0L8XALRFHh4KPHig0Q1ug=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
  <div id="tunifyNav"></div>

  <div class="page-wrap">
    <div class="container">
      <div class="page-header fade-in-up">
        <div class="d-flex flex-wrap align-items-center justify-content-between" style="gap:1rem">
          <div>
            <p class="section-eyebrow">Brands catalog</p>
            <h1 class="section-title">Manage Brands</h1>
            <p class="section-sub">Add, modify, and delete product brands for catalog filtering.</p>
          </div>
          <button class="btn-gold" id="btnAddNewBrand"><i class="fas fa-plus mr-1"></i> Add Brand</button>
        </div>
      </div>

      <!-- Data Table Card -->
      <div class="panel-card fade-in-up mt-4" style="max-width: 900px; margin: 0 auto;">
        <div class="table-responsive">
          <table id="brandsTable" class="display nowrap" style="width:100%">
            <thead>
              <tr>
                <th>ID</th>
                <th>Logo</th>
                <th>Brand Name</th>
                <th>Associated Products</th>
                <th>Description</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              <!-- Populated dynamically -->
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </div>

  <!-- Modal Form: Add / Edit Brand -->
  <div class="modal fade" id="brandModal" tabindex="-1" role="dialog" aria-hidden="true">
    <div class="modal-dialog" role="document">
      <div class="modal-content">
        <form id="brandForm" class="form-tunify" novalidate>
          <div class="modal-header">
            <h5 class="modal-title" id="modalTitle">Add Brand</h5>
            <button type="button" class="close" data-dismiss="modal" aria-label="Close">
              <span aria-hidden="true">&times;</span>
            </button>
          </div>
          <div class="modal-body">
              <input type="hidden" id="brandOldName" value="" />
              <input type="hidden" id="brandId" value="" />

              <!-- Brand Name Input -->
              <div class="form-group">
                <label for="brandName">Brand Name</label>
                <input type="text" class="form-control" id="brandName" name="brandName" placeholder="e.g. Fender" required />
              </div>

              <!-- Brand Logo Input -->
              <div class="form-group">
                <label for="brandLogoFile">Brand Logo</label>
                <div class="custom-file mb-2">
                  <input type="file" class="custom-file-input" id="brandLogoFile" name="brandLogoFile" accept="image/png, image/jpeg, image/jpg" />
                  <label class="custom-file-label" for="brandLogoFile" id="fileLabel">Choose logo file...</label>
                </div>
                <div id="logoPreviewContainer" class="mt-2" style="display:none;">
                  <img id="logoPreview" src="" height="50" style="object-fit:contain; border-radius:4px; background: rgba(255,255,255,0.05); padding: 2px;" />
                </div>
                <small class="form-text text-muted" style="font-size:0.7rem;">Only .jpg, .jpeg, and .png allowed. Max size 2MB.</small>
              </div>

              <!-- Brand Description Input -->
              <div class="form-group">
                <label for="brandDesc">Description</label>
                <textarea class="form-control" id="brandDesc" name="brandDesc" placeholder="Describe this brand..." rows="3"></textarea>
              </div>

              <!-- Associated Products Checklist -->
              <div class="form-group" id="prodChecklistGroup">
                <label>Associate Products</label>
                <div id="productChecklist" style="max-height: 180px; overflow-y: auto; border: 1px solid rgba(255,255,255,0.08); padding: 0.75rem; border-radius: 8px; background: rgba(0,0,0,0.25);">
                  <!-- JavaScript will inject checkboxes here -->
                </div>
                <small class="form-text text-muted" style="font-size:0.7rem;">Check the products that belong to this brand.</small>
              </div>
            </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-outline-secondary" data-dismiss="modal">Cancel</button>
            <button type="submit" class="btn-gold" id="btnSaveBrand"><i class="fas fa-save mr-1"></i> Save
              Brand</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <div id="tunifyFooter"></div>
  <div class="toast-container" id="toastContainer"></div>

  <!-- JS Dependencies -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.min.js"></script>
  <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>

  <!-- DataTables -->
  <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
  <!-- SweetAlert2 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.16.1/sweetalert2.min.js"
    integrity="sha512-LGHBR+kJ5jZSIzhhdfytPoEHzgaYuTRifq9g5l6ja6/k9NAOsAi5dQh4zQF6JIRB8cAYxTRedERUF+97/KuivQ=="
    crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <!-- Bootbox -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/bootbox.js/5.5.2/bootbox.min.js"></script>
  <!-- jQuery Validation -->
  <script src="https://cdn.jsdelivr.net/npm/jquery-validation@1.19.5/dist/jquery.validate.min.js"></script>

  <script src="../js/data.js"></script>
  <script src="../js/app.js"></script>
  <script src="js/admin-brands.js?v=2026"></script>
</body>

</html>
