<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile — Tunify</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <!-- SweetAlert2 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.16.1/sweetalert2.css" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/pages.css" />
</head>

<body>
  <div id="tunifyNav"></div>

  <div class="page-wrap">
    <div class="container">
      <div class="row">
        <div class="col-lg-4 mb-4">
          <div class="panel-card fade-in-up" id="profilePanel">
            <div class="profile-avatar" id="profileAvatar" style="position: relative;">
              <i class="fas fa-user"></i>
              <div class="profile-avatar-overlay"
                style="position: absolute; bottom:0; left:0; right:0; background: rgba(0,0,0,0.5); color:white; padding:.5rem; font-size:.7rem; text-align:center; opacity:0; transition: opacity .2s; cursor:pointer;">
                <i class="fas fa-camera mr-1"></i> Change
              </div>
              <input type="file" id="editProfilePicture" accept="image/*" style="display: none;" />
            </div>
            <h2 style="font-family:var(--font-display);font-size:1.25rem;color:var(--text)" id="profileName"></h2>
            <p style="font-size:.82rem;color:var(--silver)" id="profileEmail"></p>
            <button class="btn-outline-gold btn-block mt-3" id="logoutBtn" style="font-size:.75rem">
              <i class="fas fa-sign-out-alt"></i> Logout
            </button>
          </div>
        </div>
        <div class="col-lg-8">
          <ul class="nav nav-tabs tunify-tabs fade-in-up" role="tablist">
            <li class="nav-item"><a class="nav-link active" data-toggle="tab" href="#tabEdit">Edit Profile</a></li>
            <li class="nav-item"><a class="nav-link" data-toggle="tab" href="#tabOrders">My Orders</a></li>
          </ul>
          <div class="tab-content panel-card fade-in-up">
            <div class="tab-pane fade show active form-tunify" id="tabEdit">
              <div class="form-group mt-2">
                <label>Full Name</label>
                <input type="text" class="form-control" id="editName" />
              </div>
              <div class="form-group">
                <label>Email</label>
                <input type="email" class="form-control" id="editEmail" />
              </div>
              <div class="form-group">
                <label>Phone</label>
                <input type="text" class="form-control" id="editPhone" />
              </div>
              <button class="btn-gold" id="saveProfile"><i class="fas fa-save"></i> Save Changes</button>
            </div>
            <div class="tab-pane fade" id="tabOrders">
              <div class="mt-2" id="orderList"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="tunifyFooter"></div>
  <div class="toast-container" id="toastContainer"></div>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.min.js"></script>
  <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
  <!-- SweetAlert2 & Bootbox.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.16.1/sweetalert2.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/bootbox.js/5.5.2/bootbox.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/profile.js"></script>
</body>

</html>
