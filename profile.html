<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile — Tunify</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <!-- SweetAlert2 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.16.1/sweetalert2.css" />
  <link rel="stylesheet" href="css/style.css?v=20260622" />
  <link rel="stylesheet" href="css/pages.css?v=20260622" />
</head>

<body data-page="profile">
  <div id="tunifyNav"></div>

  <div class="page-wrap">
    <div class="container">
      <div class="row">
        <div class="col-lg-4 mb-4">
          <div class="panel-card fade-in-up" id="profilePanel">
            <div class="profile-avatar" id="profileAvatar" style="position: relative; overflow: hidden;">
              <div id="profileAvatarContainer" style="width:100%; height:100%; display:flex; align-items:center; justify-content:center;">
                <i class="fas fa-user"></i>
              </div>
              <div class="profile-avatar-overlay"
                style="position: absolute; bottom:0; left:0; right:0; background: rgba(0,0,0,0.5); color:white; padding:.5rem; font-size:.7rem; text-align:center; opacity:0; transition: opacity .2s; cursor:pointer;">
                <i class="fas fa-camera mr-1"></i> Change
              </div>
              <input type="file" id="editProfilePicture" accept="image/*" style="display: none;" />
            </div>
            <h2 style="font-family:var(--font-display);font-size:1.25rem;color:var(--text)" id="profileName"></h2>
            <p style="font-size:.82rem;color:var(--silver)" id="profileEmail"></p>
            <button class="btn-outline-gold btn-block mt-3" id="logoutBtn" style="font-size:.75rem">
              <i class="fas fa-sign-out-alt"></i> Logout
            </button>
            <button class="btn-outline-gold btn-block mt-2" id="deactivateBtn"
              style="font-size:.75rem; border: 1px solid #f87171; color: #f87171; background: transparent; transition: all 0.2s ease-in-out;">
              <i class="fas fa-trash-alt"></i> Deactivate Account
            </button>
          </div>
        </div>
        <div class="col-lg-8">
          <ul class="nav nav-tabs tunify-tabs fade-in-up" role="tablist">
            <li class="nav-item"><a class="nav-link active" data-toggle="tab" href="#tabEdit">Edit Profile</a></li>
            <li class="nav-item"><a class="nav-link" data-toggle="tab" href="#tabAddresses">My Addresses</a></li>
            <li class="nav-item"><a class="nav-link" data-toggle="tab" href="#tabOrders">My Orders</a></li>
          </ul>
          <div class="tab-content panel-card fade-in-up">
            <div class="tab-pane fade show active form-tunify" id="tabEdit">
              <div class="row mt-2">
                <div class="col-md-6 form-group">
                  <label>First Name</label>
                  <input type="text" class="form-control" id="editFirstName" required />
                  <div class="invalid-feedback">Please enter at least 2 characters.</div>
                </div>
                <div class="col-md-6 form-group">
                  <label>Last Name</label>
                  <input type="text" class="form-control" id="editLastName" required />
                  <div class="invalid-feedback">Please enter at least 2 characters.</div>
                </div>
              </div>
              <div class="form-group">
                <label>Email</label>
                <input type="email" class="form-control" id="editEmail" required disabled />
                <div class="invalid-feedback">Please enter a valid email address.</div>
              </div>
              <div class="form-group">
                <label>Phone</label>
                <input type="text" class="form-control" id="editPhone" pattern="^\+?[0-9][0-9\s-]{6,14}$" />
                <div class="invalid-feedback">Phone number must start with + or a digit, be 7-15 characters, and contain no letters.</div>
              </div>
              <button class="btn-gold" id="saveProfile"><i class="fas fa-save"></i> Save Changes</button>
            </div>
            <div class="tab-pane fade" id="tabAddresses">
              <h3 style="font-family:var(--font-display);font-size:1.1rem;color:var(--gold);margin-top:.5rem;margin-bottom:1rem;">Manage Saved Addresses</h3>
              <div id="addressList" class="mb-4"></div>
              
              <hr style="border-color:rgba(255,255,255,0.08); margin:1.5rem 0;" />
              
              <h4 style="font-family:var(--font-display);font-size:0.95rem;color:var(--text);margin-bottom:0.75rem;">Add New Address</h4>
              <form id="addAddressForm" class="form-tunify">
                <div class="row">
                  <div class="col-md-3 form-group">
                    <label>Label (e.g. Home, Office)</label>
                    <input type="text" class="form-control" id="newAddressLabel" placeholder="Home" required />
                  </div>
                  <div class="col-md-9 form-group">
                    <label>Street Address</label>
                    <input type="text" class="form-control" id="newAddressStreet" placeholder="123 Music Ave" required />
                  </div>
                </div>
                <div class="row">
                  <div class="col-md-4 form-group">
                    <label>City</label>
                    <input type="text" class="form-control" id="newAddressCity" placeholder="Quezon City" required />
                  </div>
                  <div class="col-md-5 form-group">
                    <label>Province</label>
                    <input type="text" class="form-control" id="newAddressProvince" placeholder="Metro Manila" required />
                  </div>
                  <div class="col-md-3 form-group">
                    <label>Zip Code</label>
                    <input type="text" class="form-control" id="newAddressZip" placeholder="1100" required />
                  </div>
                </div>
                <div class="form-check mb-3">
                  <input type="checkbox" class="form-check-input" id="newAddressDefault" />
                  <label class="form-check-label" for="newAddressDefault" style="font-size: .85rem; color: var(--silver); cursor: pointer;">Set as default address</label>
                </div>
                <button type="submit" class="btn-gold" id="saveNewAddressBtn"><i class="fas fa-plus"></i> Add Address</button>
              </form>
            </div>
            <div class="tab-pane fade" id="tabOrders">
              <div class="mt-2" id="orderList"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="tunifyFooter"></div>
  <div class="toast-container" id="toastContainer"></div>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.min.js"></script>
  <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
  <!-- SweetAlert2 & Bootbox.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.16.1/sweetalert2.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/bootbox.js/5.5.2/bootbox.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/user.js?v=20260622"></script>
</body>

</html>
