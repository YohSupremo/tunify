<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Tunify</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <!-- SweetAlert2 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.16.1/sweetalert2.css"/>
  <link rel="stylesheet" href="css/style.css?v=20260622"/>
  <link rel="stylesheet" href="css/pages.css?v=20260622"/>
</head>
<body data-page="login">
<div id="tunifyNav"></div>

<section class="auth-page">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-5">
        <div class="auth-card">
          <h1>Welcome back</h1>
          <p class="auth-sub">Sign in to track orders and manage your profile.</p>
          <form id="authForm" class="form-tunify" novalidate>
            <div class="form-group">
              <label for="email">Email</label>
              <input type="email" class="form-control" id="email" name="email" placeholder="you@example.com" required/>
            </div>
            <div class="form-group">
              <label for="password">Password</label>
              <div class="password-wrap">
                <input type="password" class="form-control" id="password" name="password" placeholder="••••••••" required/>
                <button type="button" class="password-toggle"><i class="fas fa-eye"></i></button>
              </div>
            </div>
            <div class="form-check mb-3">
              <input type="checkbox" class="form-check-input" id="remember"/>
              <label class="form-check-label" for="remember">Remember me</label>
            </div>
            <button type="button" class="btn-gold btn-block" id="login"><i class="fas fa-sign-in-alt"></i> Login</button>
            <div class="text-center mt-2" style="font-size:.72rem; color:var(--text-dim)">
              <i class="fas fa-info-circle mr-1"></i> Admin demo: Use <strong>admin@tunify.com</strong> (or any email containing "admin") and any password.
            </div>
          </form>
          <p class="text-center mt-3 mb-0" style="font-size:.82rem;color:var(--silver)">
            No account? <a href="register.html">Register here</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</section>

<div class="toast-container" id="toastContainer"></div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.min.js"></script>
<script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
<!-- SweetAlert2 & Bootbox.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.16.1/sweetalert2.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootbox.js/5.5.2/bootbox.min.js"></script>
<!-- jQuery Validation -->
<script src="https://cdn.jsdelivr.net/npm/jquery-validation@1.19.5/dist/jquery.validate.min.js"></script>
<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script src="js/layout.js?v=2026"></script>
<script src="js/user.js?v=2026"></script>

</body>
</html>
