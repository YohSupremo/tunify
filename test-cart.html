<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TEST CART</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body style="background: #15202b; color: white; padding: 20px;">

  <h1>Test Cart Add & Display</h1>
  
  <button id="addTestItemBtn" class="btn btn-primary mb-4">Add Test Item to Cart</button>
  
  <button id="clearCartBtn" class="btn btn-danger mb-4">Clear Cart</button>

  <div id="testResults"></div>
  
  <div id="tunifyNav"></div>
  
  <div class="page-wrap">
    <div class="container">
      <div class="page-header fade-in-up">
        <h1>Cart</h1>
        <nav aria-label="breadcrumb">
          <ol class="breadcrumb bg-transparent p-0">
            <li class="breadcrumb-item"><a href="index.html">Home</a></li>
            <li class="breadcrumb-item active" aria-current="page">Cart</li>
          </ol>
        </nav>
      </div>
      <div class="row">
        <div class="col-lg-8">
          <div id="cartEmpty" class="text-center py-8">
            <i class="fas fa-shopping-cart mb-3" style="font-size:3rem;color:var(--text-dim)"></i>
            <h3>Your cart is empty</h3>
            <a href="shop.html" class="btn-gold">Continue Shopping</a>
          </div>
          <div id="cartContent" style="display:none">
            <table class="cart-table">
              <thead>
                <tr>
                  <th>Product</th>
                  <th class="d-none d-md-table-cell">Price</th>
                  <th style="width:120px">Qty</th>
                  <th style="width:120px">Total</th>
                </tr>
              </thead>
              <tbody id="cartBody">
                <!-- Cart items injected here -->
              </tbody>
            </table>
          </div>
        </div>
        <div class="col-lg-4">
          <div class="cart-summary">
            <h3 class="mb-3">Order Summary</h3>
            <div class="summary-row"><span>Subtotal</span><span id="summarySubtotal">₱0</span></div>
            <div class="summary-row"><span>Shipping</span><span>Free</span></div>
            <div class="promo-apply mb-3">
              <input type="text" id="promoInput" placeholder="Promo code">
              <button class="btn btn-light" id="applyPromo">Apply</button>
            </div>
            <div class="summary-row summary-total" id="summaryTotalRow"><span>Total</span><span id="summaryTotal">₱0</span></div>
            <a href="#" id="checkoutBtn" class="btn-gold w-100 text-center d-block">Proceed to Checkout</a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="tunifyFooter"></div>
  
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.min.js"></script>
  <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/cart-page.js"></script>

  <script>
    // Test buttons
    document.getElementById('addTestItemBtn').addEventListener('click', function() {
      console.log('Adding test item!');
      const testProduct = TunifyProducts[0];
      Tunify.cart.add(testProduct.id, 1);
      CartPage.render();
      document.getElementById('testResults').innerHTML = 
        `<div style="background: green; padding: 10px; border-radius: 5px;">Added "${testProduct.name}"! Now calling CartPage.render()...</div>`;
    });

    document.getElementById('clearCartBtn').addEventListener('click', function() {
      localStorage.removeItem('tunify_cart');
      Tunify.updateCartCount();
      CartPage.render();
      document.getElementById('testResults').innerHTML = 
        `<div style="background: red; padding: 10px; border-radius: 5px;">Cart cleared!</div>`;
    });

    // Call CartPage.init() when everything loads
    $(document).ready(function() {
      CartPage.init();
    });
  </script>
  
</body>
</html>
