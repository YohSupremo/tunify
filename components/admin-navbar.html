<!-- Mobile Toggle Behavior Script -->
<script>
  // Clean up any existing listeners to prevent duplicates
  $(document).off('click', '.sidebar-toggle-btn');
  $(document).on('click', '.sidebar-toggle-btn', function(e) {
    e.stopPropagation();
    $('.admin-sidebar').toggleClass('active');
    $('.sidebar-overlay').toggleClass('active');
  });
  
  $(document).off('click', '.sidebar-overlay');
  $(document).on('click', '.sidebar-overlay', function() {
    $('.admin-sidebar').removeClass('active');
    $('.sidebar-overlay').removeClass('active');
  });

  // Automatically close slide-out drawer on navigation click (mobile)
  $(document).off('click', '.sidebar-link');
  $(document).on('click', '.sidebar-link', function() {
    if ($(window).width() < 992) {
      $('.admin-sidebar').removeClass('active');
      $('.sidebar-overlay').removeClass('active');
    }
  });

  // ── Populate avatar and name ────────────────────────────────────
  // Step 1: Apply immediately from sessionStorage (fast, no flicker)
  (function applyStoredProfile() {
    const avatarUrl = sessionStorage.getItem('tunify_avatar');
    const firstName = sessionStorage.getItem('tunify_first_name') || '';
    if (avatarUrl && avatarUrl !== 'null' && avatarUrl !== 'undefined') {
      $('#adminNavAvatarContainer').html(`<img src="${avatarUrl}" style="width:100%; height:100%; object-fit:cover;" />`);
    }
    if (firstName && firstName !== 'null') {
      $('#adminNavName').text(firstName);
    }
  })();

  // Step 2: If avatar is still missing (fresh login), silently fetch from API
  (function fetchProfileIfNeeded() {
    const avatarUrl = sessionStorage.getItem('tunify_avatar');
    const tokenRaw = sessionStorage.getItem('token');
    const userId = sessionStorage.getItem('userId') ? JSON.parse(sessionStorage.getItem('userId')) : null;
    if (avatarUrl && avatarUrl !== 'null' && avatarUrl !== 'undefined') return; // already have it
    if (!tokenRaw || !userId) return; // not logged in

    let token;
    try { token = JSON.parse(tokenRaw); } catch(e) { token = tokenRaw; }

    $.ajax({
      method: 'POST',
      url: 'http://localhost:5000/api/v1/update-profile',
      contentType: 'application/json; charset=utf-8',
      dataType: 'json',
      data: JSON.stringify({ user_id: userId }),
      headers: { 'Authorization': 'Bearer ' + token },
      success: function(data) {
        if (data && data.customer) {
          const c = data.customer;
          // Store in sessionStorage for subsequent page loads
          if (c.profile_image_path) {
            const fullUrl = 'http://localhost:5000/' + c.profile_image_path;
            sessionStorage.setItem('tunify_avatar', fullUrl);
            $('#adminNavAvatarContainer').html(`<img src="${fullUrl}" style="width:100%; height:100%; object-fit:cover;" />`);
          }
          const firstName = c.first_name || '';
          if (firstName) {
            sessionStorage.setItem('tunify_first_name', firstName);
            sessionStorage.setItem('tunify_last_name', c.last_name || '');
            $('#adminNavName').text(firstName);
          }
        }
      }
    });
  })();

  // ── Admin Sidebar Logout ────────────────────────────────────────
  // Direct handler here since Bootstrap dropdown may swallow bubbled events
  $(document).off('click.adminLogout', '#logoutBtn');
  $(document).on('click.adminLogout', '#logoutBtn', function(e) {
    e.preventDefault();
    e.stopPropagation();
    // Close the dropdown first
    $('#adminAccountDropdown').dropdown('hide');
    Swal.fire({
      title: 'Log Out?',
      text: 'Are you sure you want to log out of the admin panel?',
      icon: 'warning',
      showCancelButton: true,
      confirmButtonText: '<i class="fas fa-sign-out-alt mr-1"></i> Yes, Log Out',
      cancelButtonText: '<i class="fas fa-times mr-1"></i> Cancel',
      confirmButtonColor: '#ef4444',
      cancelButtonColor: '#374151',
      background: '#0a0f1e',
      color: '#e2e8f0'
    }).then(function(result) {
      if (result.isConfirmed) {
        sessionStorage.clear();
        Swal.fire({
          text: 'Logged out',
          showConfirmButton: false,
          position: 'bottom-right',
          timer: 1000,
          timerProgressBar: true,
          background: '#0a0f1e',
          color: '#e2e8f0'
        }).then(function() {
          window.location.href = '../login.html';
        });
      }
    });
  });
</script>
