<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart — Tunify</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <!-- SweetAlert2 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.16.1/sweetalert2.css" />
  <link rel="stylesheet" href="css/style.css?v=20260622">
  <link rel="stylesheet" href="css/pages.css?v=20260622">
</head>

<body>
  <div id="tunifyNav"></div>
  <div class="page-wrap">
    <div class="container">
      <div class="page-header fade-in-up">
        <h1>Cart</h1>
        <nav aria-label="breadcrumb">
          <ol class="breadcrumb bg-transparent p-0">
            <li class="breadcrumb-item"><a href="index.html">Home</a></li>
            <li class="breadcrumb-item active" aria-current="page">Cart</li>
          </ol>
        </nav>
      </div>
      <div class="row">
        <div class="col-lg-8">
          <div id="cartEmpty" class="text-center py-8">
            <i class="fas fa-shopping-cart mb-3" style="font-size:3rem;color:var(--text-dim)"></i>
            <h3>Your cart is empty</h3>
            <a href="shop.html" class="btn-gold">Continue Shopping</a>
          </div>
          <div id="cartContent" style="display:none">
            <table class="cart-table">
              <thead>
                <tr>
                  <th style="width: 50px; text-align: center;"><input type="checkbox" id="selectAllCart" checked style="transform: scale(1.2); cursor: pointer;"></th>
                  <th>Product</th>
                  <th class="d-none d-md-table-cell">Price</th>
                  <th style="width:160px">Qty</th>
                  <th style="width:120px">Total</th>
                  <th style="width:50px"></th>
                </tr>
              </thead>
              <tbody id="cartBody">
                <!-- Cart items injected here -->
              </tbody>
            </table>
          </div>
        </div>
        <div class="col-lg-4">
          <div class="cart-summary">
            <h3 class="mb-3">Order Summary</h3>
            <div class="summary-row"><span>Subtotal</span><span id="summarySubtotal">₱0.00</span></div>
            <div class="summary-row"><span>Shipping</span><span id="summaryShipping">₱100.00</span></div>
            <div class="summary-row summary-total" id="summaryTotalRow" style="border-top: 1px solid var(--border); padding-top: 1rem; margin-top: 1rem;"><span>Total</span><span
                id="summaryTotal">₱0.00</span></div>
            <a href="#" id="checkoutBtn" class="btn-gold w-100 text-center d-block">Proceed to Checkout</a>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div id="tunifyFooter"></div>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.min.js"></script>
  <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
  <!-- SweetAlert2 & Bootbox.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.16.1/sweetalert2.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/bootbox.js/5.5.2/bootbox.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/cart-page.js"></script>
</body>

</html>
